<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"

    <title>engiNUity</title>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <h1>engiNUity Control Center</h1>
    <div id='canvas-division'>
    <!-- Canvases will be added here -->
      <div id='switch-division'>
      <!-- Switches will be added here -->
      </div>

  </div>


  <div>
    <br>
    <br>
    <br>
    <br>
        <button id="emergencyShutoff">EMERGENCY SHUTOFF</button>
        <button id="fireIgniter">Fire Igniter</button>
    <button id="ethanolSolenoidPeriod">ethanol for n seconds</button>
    <button id="oxSolenoidPeriod">ox for n seconds</button>
    <input type="checkbox" id="islogging"></input>
  </div>

  <div id="filter-controls">
    <p id="filter-title">Noise Reduction Filter</p>
    <button class="filter-button active" data-filter="median-ema">Median + EMA</button>
    <button class="filter-button" data-filter="median">Median Only</button>
    <button class="filter-button" data-filter="ema">EMA Only</button>
    <button class="filter-button" data-filter="freq">Frequency LPF</button>
    <button class="filter-button" data-filter="freq-gaussian">Frequency LPF (Gaussian)</button>
    <button class="filter-button" data-filter="freq-cascade">Frequency LPF (Cascade Strong)</button>
    <button class="filter-button" data-filter="none">None</button>
    <p id="filter-latency">Estimated latency: calculating...</p>
  </div>

	<!-- <canvas id="readings"></canvas> -->
  
	<script src="./node_modules/chart.js/dist/chart.umd.min.js"></script>
